<section class="estructuras-page">
  <div class="container">
    <div class="estructura-hero">
      <p class="seccion-etiqueta">Estructuras</p>
      <h1>Estructuras Orgánicas</h1>
      <p class="estructura-intro">
        Consulta las dependencias municipales, sus fechas de actualización y validación, así como el acceso al documento correspondiente.
      </p>
    </div>

    <section class="estructura-org">
      <div class="estructura-toolbar">
        <div class="search-container">
          <input
            type="text"
            id="search"
            placeholder="Buscar dependencia..."
            class="search-input"
          >
        </div>

        <p class="estructura-results" id="estructura-results">
          Mostrando todas las dependencias
        </p>
      </div>

      <div class="estructura-table-wrap">
        <table class="estructura-table">
          <thead>
            <tr>
              <th>Dependencia</th>
              <th>Fecha de Actualización</th>
              <th>Fecha de Validación</th>
              <th>Descarga</th>
            </tr>
          </thead>
          <tbody id="estructura-table-body"></tbody>
        </table>
      </div>
    </section>
  </div>
</section>
